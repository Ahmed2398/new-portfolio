<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Background circles -->
  <circle cx="400" cy="300" r="280" fill="url(#bg-gradient)" opacity="0.1"/>
  <circle cx="400" cy="300" r="200" fill="url(#bg-gradient-2)" opacity="0.15"/>
  
  <!-- Laptop base -->
  <rect x="150" y="320" width="500" height="280" rx="10" fill="#1e293b"/>
  <rect x="160" y="330" width="480" height="240" rx="8" fill="#0f172a"/>
  
  <!-- Screen -->
  <rect x="170" y="340" width="460" height="220" rx="5" fill="#0f172a"/>
  
  <!-- Code editor interface -->
  <!-- Header bar -->
  <rect x="170" y="340" width="460" height="30" fill="#334155"/>
  <circle cx="185" cy="355" r="5" fill="#ef4444"/>
  <circle cx="205" cy="355" r="5" fill="#f59e0b"/>
  <circle cx="225" cy="355" r="5" fill="#10b981"/>
  
  <!-- Code lines with syntax highlighting -->
  <!-- Line 1 -->
  <rect x="190" y="385" width="60" height="8" rx="2" fill="#60a5fa" opacity="0.8"/>
  <rect x="260" y="385" width="100" height="8" rx="2" fill="#93c5fd" opacity="0.6"/>
  
  <!-- Line 2 -->
  <rect x="210" y="405" width="80" height="8" rx="2" fill="#60a5fa" opacity="0.8"/>
  <rect x="300" y="405" width="120" height="8" rx="2" fill="#93c5fd" opacity="0.6"/>
  <rect x="430" y="405" width="40" height="8" rx="2" fill="#60a5fa" opacity="0.5"/>
  
  <!-- Line 3 -->
  <rect x="210" y="425" width="100" height="8" rx="2" fill="#3b82f6" opacity="0.9"/>
  <rect x="320" y="425" width="80" height="8" rx="2" fill="#93c5fd" opacity="0.6"/>
  
  <!-- Line 4 -->
  <rect x="190" y="445" width="70" height="8" rx="2" fill="#60a5fa" opacity="0.8"/>
  
  <!-- Line 5 -->
  <rect x="210" y="465" width="90" height="8" rx="2" fill="#60a5fa" opacity="0.8"/>
  <rect x="310" y="465" width="110" height="8" rx="2" fill="#93c5fd" opacity="0.6"/>
  
  <!-- Line 6 -->
  <rect x="210" y="485" width="150" height="8" rx="2" fill="#3b82f6" opacity="0.9"/>
  <rect x="370" y="485" width="60" height="8" rx="2" fill="#60a5fa" opacity="0.6"/>
  
  <!-- Line 7 -->
  <rect x="190" y="505" width="65" height="8" rx="2" fill="#60a5fa" opacity="0.8"/>
  
  <!-- Line 8 -->
  <rect x="190" y="525" width="200" height="8" rx="2" fill="#93c5fd" opacity="0.5"/>
  
  <!-- Cursor blinking effect -->
  <rect x="395" y="525" width="3" height="10" fill="#60a5fa">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Keyboard -->
  <rect x="200" y="605" width="400" height="15" rx="5" fill="#334155"/>
  
  <!-- Floating code elements -->
  <!-- Left side brackets -->
  <text x="100" y="250" font-family="monospace" font-size="48" fill="#3b82f6" opacity="0.3" font-weight="bold">&lt;/&gt;</text>
  
  <!-- Right side curly braces -->
  <text x="670" y="280" font-family="monospace" font-size="42" fill="#60a5fa" opacity="0.3" font-weight="bold">{ }</text>
  
  <!-- Top function symbol -->
  <text x="350" y="180" font-family="monospace" font-size="36" fill="#93c5fd" opacity="0.25" font-weight="bold">fn()</text>
  
  <!-- Decorative code symbols -->
  <circle cx="120" cy="400" r="8" fill="#3b82f6" opacity="0.2"/>
  <circle cx="680" cy="420" r="10" fill="#60a5fa" opacity="0.2"/>
  <circle cx="140" cy="520" r="6" fill="#93c5fd" opacity="0.2"/>
  <circle cx="660" cy="500" r="7" fill="#3b82f6" opacity="0.2"/>
  
  <!-- Network connection lines -->
  <line x1="400" y1="150" x2="400" y2="320" stroke="#60a5fa" stroke-width="2" opacity="0.2" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
  </line>
  
  <!-- Data nodes -->
  <circle cx="400" cy="150" r="12" fill="#3b82f6" opacity="0.4">
    <animate attributeName="r" values="12;16;12" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg-gradient-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
