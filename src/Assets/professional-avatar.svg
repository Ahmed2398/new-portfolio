<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="main-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer glow circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bg-grad)"/>
  
  <!-- Main avatar circle -->
  <circle cx="200" cy="200" r="150" fill="#1e293b" stroke="url(#main-grad)" stroke-width="3"/>
  
  <!-- Person silhouette -->
  <!-- Head -->
  <circle cx="200" cy="160" r="45" fill="url(#main-grad)"/>
  
  <!-- Body/shoulders -->
  <ellipse cx="200" cy="280" rx="85" ry="95" fill="url(#main-grad)"/>
  
  <!-- Tech elements around -->
  <!-- Monitor icon top left -->
  <g opacity="0.6">
    <rect x="70" y="70" width="50" height="35" rx="3" stroke="url(#accent-grad)" stroke-width="2" fill="none"/>
    <line x1="70" y1="80" x2="120" y2="80" stroke="url(#accent-grad)" stroke-width="2"/>
    <rect x="90" y="105" width="10" height="8" fill="url(#accent-grad)"/>
  </g>
  
  <!-- Code brackets top right -->
  <text x="290" y="95" font-family="monospace" font-size="40" fill="url(#accent-grad)" opacity="0.6" font-weight="bold">&lt;/&gt;</text>
  
  <!-- Gear bottom left -->
  <g opacity="0.6" transform="translate(80, 290)">
    <circle cx="15" cy="15" r="12" stroke="url(#accent-grad)" stroke-width="2" fill="none"/>
    <circle cx="15" cy="15" r="6" fill="url(#accent-grad)"/>
    <line x1="15" y1="3" x2="15" y2="7" stroke="url(#accent-grad)" stroke-width="2"/>
    <line x1="15" y1="23" x2="15" y2="27" stroke="url(#accent-grad)" stroke-width="2"/>
    <line x1="3" y1="15" x2="7" y2="15" stroke="url(#accent-grad)" stroke-width="2"/>
    <line x1="23" y1="15" x2="27" y2="15" stroke="url(#accent-grad)" stroke-width="2"/>
  </g>
  
  <!-- Terminal/command icon bottom right -->
  <g opacity="0.6">
    <rect x="280" y="280" width="50" height="40" rx="3" stroke="url(#accent-grad)" stroke-width="2" fill="none"/>
    <polyline points="290,295 295,300 290,305" stroke="url(#accent-grad)" stroke-width="2" fill="none"/>
    <line x1="300" y1="305" x2="315" y2="305" stroke="url(#accent-grad)" stroke-width="2"/>
  </g>
  
  <!-- Floating particles -->
  <circle cx="120" cy="200" r="4" fill="#60a5fa" opacity="0.4">
    <animate attributeName="cy" values="200;190;200" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="200" r="4" fill="#3b82f6" opacity="0.4">
    <animate attributeName="cy" values="200;210;200" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="100" r="3" fill="#93c5fd" opacity="0.5">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="320" r="3" fill="#60a5fa" opacity="0.5">
    <animate attributeName="r" values="3;5;3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Network connection lines -->
  <line x1="95" y1="90" x2="160" y2="140" stroke="#60a5fa" stroke-width="1" opacity="0.3" stroke-dasharray="3,3">
    <animate attributeName="stroke-dashoffset" from="0" to="6" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="305" y1="115" x2="245" y2="150" stroke="#3b82f6" stroke-width="1" opacity="0.3" stroke-dasharray="3,3">
    <animate attributeName="stroke-dashoffset" from="0" to="6" dur="1.2s" repeatCount="indefinite"/>
  </line>
</svg>
