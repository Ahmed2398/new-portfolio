<svg width="180" height="50" viewBox="0 0 180 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c770f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cd5ff8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- AA Monogram Circle -->
  <circle cx="25" cy="25" r="22" fill="url(#logoGradient)" opacity="0.1"/>
  <circle cx="25" cy="25" r="22" stroke="url(#logoGradient)" stroke-width="2" fill="none"/>
  
  <!-- AA Letters -->
  <text x="25" y="32" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="url(#logoGradient)" text-anchor="middle">AA</text>
  
  <!-- Text -->
  <text x="58" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">
    Ahmed
  </text>
  <text x="58" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="url(#logoGradient)">
    Full Stack Developer
  </text>
</svg>
