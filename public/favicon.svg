      <stop offset="0%" style="stop-color:#c770f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cd5ff8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8a2be2;stop-opacity:1" />
